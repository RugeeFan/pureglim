name: pureglim

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pureglim_postgres_data:/var/lib/postgresql/data
    networks:
      - pureglim_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    env_file:
      - ../../shared/.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - pureglim_net

  proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${PUREGLIM_PUBLIC_PORT:-8088}:80"
    volumes:
      - ./nginx/pureglim.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - pureglim_net

networks:
  pureglim_net:
    name: pureglim_net

volumes:
  pureglim_postgres_data:
    name: pureglim_postgres_data
