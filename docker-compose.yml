services:
  postgres:
    image: postgres:16-alpine
    container_name: pureglim-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pureglim
      POSTGRES_USER: pureglim
      POSTGRES_PASSWORD: pureglim
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
